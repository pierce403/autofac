      <text x="711" y="218" fill="#645B4F" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">BAKING STAPLES</text>
      <text x="711" y="252" fill="#1D1A16" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="800">Northmill Flour</text>
      <text x="711" y="282" fill="#256142" font-family="Avenir Next, Segoe UI, sans-serif" font-size="22" font-weight="800">$14  +18.4%</text>
    </g>

    <g>
      <rect x="888" y="188" width="198" height="102" rx="24" fill="#FFF9F1" stroke="#3A2C1E" stroke-opacity="0.08"/>
      <text x="912" y="218" fill="#645B4F" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">PAPER GOODS</text>
      <text x="912" y="252" fill="#1D1A16" font-family="Avenir Next, Segoe UI, sans-serif" font-size="26" font-weight="800">Softloop Tissue</text>
      <text x="912" y="282" fill="#BC5E29" font-family="Avenir Next, Segoe UI, sans-serif" font-size="22" font-weight="800">$16  supply tight</text>
    </g>

    <g>
      <rect x="687" y="308" width="399" height="222" rx="28" fill="#FFF8F0" stroke="#3A2C1E" stroke-opacity="0.08"/>
      <text x="715" y="344" fill="#645B4F" font-family="Avenir Next, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="1.8">30 DAY TREND</text>
      <text x="715" y="381" fill="#1D1A16" font-family="Avenir Next, Segoe UI, sans-serif" font-size="28" font-weight="800">Local staples repricing upward</text>

      <g opacity="0.5">
        <path d="M716 450H1054" stroke="#3A2C1E" stroke-opacity="0.12"/>
        <path d="M716 414H1054" stroke="#3A2C1E" stroke-opacity="0.08"/>
        <path d="M716 486H1054" stroke="#3A2C1E" stroke-opacity="0.08"/>
      </g>

      <path d="M716 491L770 478L825 460L878 430L932 390L988 356L1054 322L1054 500L716 500Z" fill="url(#chartFill)"/>
      <path d="M716 491L770 478L825 460L878 430L932 390L988 356L1054 322" stroke="#256142" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

      <g>
        <rect x="726" y="398" width="108" height="34" rx="17" fill="#EAD8BE"/>
        <text x="751" y="421" fill="#732D10" font-family="Avenir Next, Segoe UI, sans-serif" font-size="16" font-weight="700">LOCAL WIRE</text>
        <rect x="844" y="398" width="112" height="34" rx="17" fill="#FFF8EE" stroke="#3A2C1E" stroke-opacity="0.08"/>
        <text x="869" y="421" fill="#645B4F" font-family="Avenir Next, Segoe UI, sans-serif" font-size="16" font-weight="700">RIVALS 3</text>
      </g>

      <text x="715" y="464" fill="#645B4F" font-family="Avenir Next, Segoe UI, sans-serif" font-size="19">Flour demand, breakfast refills, tissue friction</text>
    </g>
