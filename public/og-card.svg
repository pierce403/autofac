    <text x="124" y="559" fill="#1D1A16" font-family="Avenir Next, Segoe UI, sans-serif" font-size="24" font-weight="700">Bakery contracts lift flour. Tissue tightens.</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="651" y="70" width="471" height="492" rx="34" fill="url(#panel)" stroke="#3A2C1E" stroke-opacity="0.12"/>

    <text x="687" y="115" fill="#645B4F" font-family="Avenir Next, Segoe UI, sans-serif" font-size="18" font-weight="700" letter-spacing="2.8">DISTRICT BOARD</text>
    <text x="687" y="150" fill="#1D1A16" font-family="Avenir Next, Segoe UI, sans-serif" font-size="33" font-weight="800">Staples Snapshot</text>

    <g>
      <rect x="990" y="96" width="92" height="92" rx="46" fill="#FFF8F0" stroke="#3A2C1E" stroke-opacity="0.08"/>
      <circle cx="1036" cy="142" r="28" fill="none" stroke="#7C5B34" stroke-opacity="0.14" stroke-width="10"/>
      <path d="M1036 114 A28 28 0 1 1 1009 150" stroke="#A54A1F" stroke-width="10" stroke-linecap="round" fill="none"/>
      <text x="1016" y="148" fill="#732D10" font-family="Avenir Next, Segoe UI, sans-serif" font-size="20" font-weight="800">43s</text>
    </g>

